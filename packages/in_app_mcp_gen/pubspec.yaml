name: in_app_mcp_gen
description: Build-runner code generator for in_app_mcp. Emits ToolDefinition and typed handler / previewer / undoer adapters from @McpTool, @McpToolPreview, and @McpToolUndo annotations.
version: 1.1.0
homepage: https://github.com/phanbaohuy96/in-app-mcp
repository: https://github.com/phanbaohuy96/in-app-mcp
issue_tracker: https://github.com/phanbaohuy96/in-app-mcp/issues

environment:
  sdk: ^3.10.8

dependencies:
  # Pin to analyzer 7.x. Analyzer 8+ retired the legacy Element API that
  # source_gen 2.x still surfaces to GeneratorForAnnotation. Once source_gen
  # 4.x is adopted we can migrate to the Element2 model and widen this.
  analyzer: ">=6.5.0 <8.0.0"
  build: ^2.4.0
  in_app_mcp_annotations: ^1.1.0
  source_gen: ">=1.5.0 <3.0.0"

dev_dependencies:
  build_runner: ">=2.4.0 <3.0.0"
  lints: ^5.0.0
  test: ^1.25.0

# Local development: point at the sibling annotations package so generator
# changes can reference new annotations before a pub.dev release. Removed
# in the published tarball via `.pubignore`.
dependency_overrides:
  in_app_mcp_annotations:
    path: ../in_app_mcp_annotations
